<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Lupe — Glas + Stiel, mit EU-gelbem Stern als Akzent.
       Background transparent. Funktioniert in Light- und Dark-Mode-Tabs. -->
  <defs>
    <linearGradient id="ring" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0891b2"/>
      <stop offset="1" stop-color="#1d4ed8"/>
    </linearGradient>
  </defs>
  <!-- Stiel (hinter dem Ring, gerundete Kappe) -->
  <rect x="40.5" y="40" width="7" height="22" rx="3.5"
        transform="rotate(-45 44 51)"
        fill="url(#ring)"/>
  <!-- Glasring -->
  <circle cx="26" cy="26" r="18" fill="none" stroke="url(#ring)" stroke-width="6"/>
  <!-- Innenfläche schwach getoent für Tiefe -->
  <circle cx="26" cy="26" r="14" fill="#e0f2fe" fill-opacity="0.6"/>
  <!-- EU-Stern als Akzent im Glas -->
  <path d="M26 16 l2.4 7.4h7.8l-6.3 4.6 2.4 7.4-6.3-4.6-6.3 4.6 2.4-7.4-6.3-4.6h7.8z"
        fill="#facc15"/>
</svg>
