# Alembic-Konfiguration fuer das auditworkshop-Backend.
# Die Datenbank-URL wird NICHT hier hartkodiert, sondern in migrations/env.py
# zur Laufzeit aus config.DATABASE_URL (bzw. der Umgebungsvariable) gelesen.
[alembic]
script_location = migrations
prepend_sys_path = .
path_separator = os
# Zeitzonenfreie UTC-Zeitstempel in Revisions-Dateinamen vermeiden Verwirrung.
# (Revisions-IDs vergeben wir ohnehin sprechend: 0001_, 0002_ ...)

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
