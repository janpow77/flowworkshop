name: CI

# Cockpit-Konventionen aus Master-Dokument Abschnitt 7:
#   - Drei Workflow-Dateien (ci.yaml, image.yaml, deploy.yaml).
#   - Minimale Permissions, SHA-Pinning der Actions, Concurrency-Gruppen.
#
# CI läuft auf Push und PR gegen main; reine Code-Qualitäts-Checks ohne
# Push zu Registries oder Deploy-Hosts.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    name: Frontend (Vitest + TypeScript + ESLint)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: auditworkshop/frontend

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: auditworkshop/frontend/package-lock.json

      - run: npm ci

      - name: TypeScript Check
        run: npx tsc -b

      - name: ESLint
        run: npm run lint -- --max-warnings 10

      - name: Vitest
        run: npm test

      - name: Production Build
        run: npm run build

  backend-lint:
    name: Backend (Ruff Lint)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: auditworkshop/backend

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b  # v5.3.0
        with:
          python-version: "3.12"

      - name: Install Ruff
        run: pip install ruff==0.7.4

      - name: Ruff Check
        run: ruff check . --select E,W,F --ignore E501

  docker-build:
    name: Docker Build Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Build Backend Image
        run: docker build -t auditworkshop-backend auditworkshop/backend/

      - name: Build Frontend Image
        run: docker build -t auditworkshop-frontend auditworkshop/frontend/
