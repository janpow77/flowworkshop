name: CI

# Cockpit-Konventionen aus Master-Dokument Abschnitt 7:
#   - Drei Workflow-Dateien (ci.yaml, image.yaml, deploy.yaml).
#   - Minimale Permissions, SHA-Pinning der Actions, Concurrency-Gruppen.
#
# CI läuft auf Push und PR gegen main; reine Code-Qualitäts-Checks ohne
# Push zu Registries oder Deploy-Hosts.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    name: Frontend (Vitest + TypeScript + ESLint)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: auditworkshop/frontend

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af  # v4.1.0
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: auditworkshop/frontend/package-lock.json

      - run: npm ci

      - name: TypeScript Check
        run: npx tsc -b

      - name: ESLint
        run: npm run lint -- --max-warnings 10

      - name: Vitest
        run: npm test

      - name: Production Build
        run: npm run build

  backend-lint:
    name: Backend (Ruff Lint)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: auditworkshop/backend

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b  # v5.3.0
        with:
          python-version: "3.12"

      - name: Install Ruff
        run: pip install ruff==0.7.4

      - name: Ruff Check
        run: ruff check . --select E,W,F --ignore E501

  docker-build:
    name: Docker Build Test (${{ matrix.image }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: backend
            context: auditworkshop/backend/
          - image: frontend
            context: auditworkshop/frontend/
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@988b5a0280414f521da01fcc63a27aeeb4b104db  # v3.6.1

      - name: Build ${{ matrix.image }} Image (Layer-Cache aus GH-Actions-Cache)
        # Dependency-Layer (pip/npm) werden zwischen Laeufen wiederverwendet;
        # nur bei Aenderungen an requirements/package-lock wird neu installiert.
        run: |
          docker buildx build \
            --cache-from type=gha,scope=ci-${{ matrix.image }} \
            --cache-to type=gha,mode=max,scope=ci-${{ matrix.image }} \
            -t auditworkshop-${{ matrix.image }} \
            ${{ matrix.context }}
