name: Image Build & Push (GHCR)

# Baut Backend + Frontend bei jedem Push auf main, taggt mit :sha-XXXXXXX
# und :latest, optional zusaetzlich mit :v1.2.3 bei Tag-Push.
# Auth: GITHUB_TOKEN hat by default packages:write fuer das Owner-Konto.

on:
  push:
    branches: [main, claude/workshop-hetzner-migration-95SDB]
    tags: ["v*.*.*"]
  workflow_dispatch:
    inputs:
      push_image:
        description: "Image zu GHCR pushen?"
        type: boolean
        default: true

permissions:
  contents: read
  packages: write

concurrency:
  group: image-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: ${{ matrix.component }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - component: backend
            context: auditworkshop/backend
            image: ghcr.io/janpow77/auditworkshop-backend
          - component: frontend
            context: auditworkshop/frontend
            image: ghcr.io/janpow77/auditworkshop-frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute tags + labels
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ matrix.image }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' || github.ref == 'refs/heads/claude/workshop-hetzner-migration-95SDB' }}
          labels: |
            org.opencontainers.image.title=auditworkshop-${{ matrix.component }}
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}

      - name: Build & Push
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.context }}
          push: ${{ github.event_name != 'pull_request' && (github.event_name != 'workflow_dispatch' || inputs.push_image) }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=auditworkshop-${{ matrix.component }}
          cache-to: type=gha,scope=auditworkshop-${{ matrix.component }},mode=max
          provenance: false  # SLSA-Provenance optional; off fuer kleinere Manifest

      - name: Image-Digest in Job-Summary
        if: always()
        run: |
          {
            echo "## ${{ matrix.component }}"
            echo ""
            echo "**Tags:**"
            echo '${{ steps.meta.outputs.tags }}' | sed 's/^/- `/; s/$/`/'
          } >> $GITHUB_STEP_SUMMARY
